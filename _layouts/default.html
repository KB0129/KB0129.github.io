<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% include head_custom.html %}
</head>
<body>
  <header class="site-header-custom">
    <div class="header-container">
      <div class="site-branding">
        <a href="{{ '/' | relative_url }}" class="site-title-custom">{{ site.title }}</a>
      </div>
      <nav class="main-navigation">
        <ul class="nav-menu">
          <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a></li>
          <li><a href="{{ '/posts/' | relative_url }}" {% if page.url == '/posts/' %}class="active"{% endif %}>Posts</a></li>
          <li><a href="{{ '/about/' | relative_url }}" {% if page.url == '/about/' %}class="active"{% endif %}>About</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="main-content-custom">
    <div class="content-wrapper">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer-custom">
    <div class="footer-container">
      {{ site.footer_content }}
    </div>
  </footer>
</body>
</html>
