<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description | default: page.excerpt | strip_html | strip_newlines | truncate: 160 }}">

  <!-- Custom Notion-inspired CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  {% if site.head_custom %}{% include head_custom.html %}{% endif %}
</head>
<body>
  <!-- Notion-style Header -->
  <header class="site-header-custom">
    <div class="header-container">
      <a href="{{ '/' | relative_url }}" class="site-title-custom">{{ site.title }}</a>
      <nav class="main-navigation">
        <ul class="nav-menu">
          <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a></li>
          <li><a href="{{ '/posts/' | relative_url }}" {% if page.url == '/posts/' %}class="active"{% endif %}>Posts</a></li>
          <li><a href="{{ '/about/' | relative_url }}" {% if page.url == '/about/' %}class="active"{% endif %}>About</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content-custom">
    <div class="content-wrapper">
      {{ content }}
    </div>
  </main>

  <!-- Notion-style Footer -->
  <footer class="site-footer-custom">
    <div class="footer-container">
      {{ site.footer_content }}
    </div>
  </footer>

  <!-- Theme Toggle Button -->
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
    <span class="theme-toggle-icon" id="theme-icon">🌙</span>
  </button>

  <!-- Theme Toggle Script -->
  <script>
    (function() {
      const themeToggle = document.getElementById('theme-toggle');
      const themeIcon = document.getElementById('theme-icon');
      const html = document.documentElement;

      // Check for saved theme preference or default to 'light'
      const currentTheme = localStorage.getItem('theme') || 'light';

      // Apply the theme on page load
      if (currentTheme === 'dark') {
        html.setAttribute('data-theme', 'dark');
        themeIcon.textContent = '☀️';
      } else {
        html.setAttribute('data-theme', 'light');
        themeIcon.textContent = '🌙';
      }

      // Toggle theme on button click
      themeToggle.addEventListener('click', function() {
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);

        // Update icon with animation
        if (newTheme === 'dark') {
          themeIcon.textContent = '☀️';
        } else {
          themeIcon.textContent = '🌙';
        }
      });
    })();
  </script>
</body>
</html>
